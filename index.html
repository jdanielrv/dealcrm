<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Deal CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#1B2E4B;--navy2:#243D63;--navy3:#152438;
  --bg:#F0F4F8;--bg2:#FFFFFF;--bg3:#E8EEF5;--bg4:#D8E2EE;
  --text:#0D1B2A;--text2:#3A5068;--text3:#7A90A8;--text4:#B0C4D8;
  --border:#D4DEE8;--border2:#C0CED8;
  --green:#1A7A40;--green-bg:#E8F5EE;--green-border:#90CCA8;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

/* ── SCREEN SYSTEM: two screens, only one visible at a time on mobile ── */
.app{position:relative;width:100vw;height:100dvh;overflow:hidden;display:flex;}

/* ── CONTACTS SCREEN (full width on mobile) ── */
.contacts-screen{
  width:100%;height:100%;display:flex;flex-direction:column;
  background:var(--bg2);flex-shrink:0;
}

/* ── CHAT SCREEN (slides in from right on mobile) ── */
.chat-screen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;background:var(--bg);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:10;
}
.chat-screen.open{transform:translateX(0);}

/* On tablet/desktop: side by side */
@media(min-width:680px){
  .contacts-screen{width:320px;min-width:320px;border-right:1px solid var(--border);flex-shrink:0;}
  .chat-screen{position:relative;transform:none !important;flex:1;}
}

/* ── CONTACTS HEADER ── */
.contacts-hdr{
  padding-top:calc(var(--safe-top) + 12px);
  padding-bottom:14px;
  padding-left:18px;padding-right:18px;
  background:var(--navy);
}
.contacts-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.brand-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.brand-sub{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.8px;text-transform:uppercase;margin-top:1px;}
.hdr-actions{display:flex;gap:8px;}
.hdr-icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.12);border:none;cursor:pointer;
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
}
.search-wrap{
  display:flex;align-items:center;gap:9px;
  background:rgba(255,255,255,.12);border-radius:12px;
  padding:9px 14px;
}
.search-wrap svg{width:15px;height:15px;stroke:rgba(255,255,255,.6);fill:none;stroke-width:2;flex-shrink:0;}
.search-wrap input{background:none;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;width:100%;}
.search-wrap input::placeholder{color:rgba(255,255,255,.45);}

/* filter pills */
.filter-row{display:flex;gap:6px;padding:10px 18px;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);}
.filter-row::-webkit-scrollbar{display:none;}
.fpill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);flex-shrink:0;}
.fpill.on{background:var(--navy);color:#fff;border-color:var(--navy);}

/* contact list */
.clist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg2);}

/* contact item — WhatsApp style */
.citem{
  display:flex;align-items:center;gap:13px;
  padding:13px 18px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;position:relative;
}
.citem:active{background:var(--bg3);}
.citem.sel{background:var(--bg3);}
.citem-ava{
  width:50px;height:50px;border-radius:50%;flex-shrink:0;
  background:var(--navy);display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;color:#fff;letter-spacing:-.5px;
}
.citem-body{flex:1;min-width:0;}
.citem-row1{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:3px;}
.citem-name{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.citem-time{font-size:12px;color:var(--text3);flex-shrink:0;}
.citem-row2{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.citem-sub{font-size:13px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.citem-badges{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.rem-badge{background:var(--navy);color:#fff;border-radius:50%;width:20px;height:20px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.citem-chips{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.chip{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;letter-spacing:.2px;text-transform:uppercase;}

/* bottom add button */
.fab{
  position:absolute;bottom:calc(24px + var(--safe-bottom));right:20px;
  width:56px;height:56px;border-radius:50%;
  background:var(--navy);color:#fff;border:none;cursor:pointer;
  font-size:26px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(27,46,75,.35);z-index:5;
}

/* ── CHAT SCREEN HEADER ── */
.chat-hdr{
  padding-top:calc(var(--safe-top) + 10px);
  padding-bottom:12px;padding-left:12px;padding-right:16px;
  background:var(--navy);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.back-btn{
  color:#fff;font-size:28px;cursor:pointer;
  padding:4px 6px 4px 2px;line-height:1;font-weight:300;flex-shrink:0;
}
.chat-ava{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
}
.chat-hdr-info{flex:1;min-width:0;}
.chat-hdr-name{font-size:17px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-hdr-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-hdr-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.hdr-chip-sm{padding:4px 9px;border-radius:5px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.2px;}
.chat-icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.12);border:none;cursor:pointer;
  color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.ibadge{position:absolute;top:-3px;right:-3px;background:#E8C84A;color:#0D1B2A;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── CHAT BODY ── */
.chat-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 14px 10px;display:flex;flex-direction:column;gap:8px;
  /* WhatsApp-style subtle background */
  background:var(--bg);
  background-image:
    radial-gradient(circle at 20% 30%, rgba(27,46,75,.04) 0%, transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(27,46,75,.03) 0%, transparent 60%);
}

/* date divider */
.date-div{display:flex;align-items:center;gap:10px;margin:6px 0;}
.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:var(--border);}
.date-div span{font-size:11px;color:var(--text3);white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;background:var(--bg);padding:0 6px;}

/* message wrappers */
.mw{display:flex;flex-direction:column;max-width:100%;}
.mw.out{align-items:flex-end;}
.mw.in{align-items:flex-start;}
.mlabel{font-size:11px;color:var(--text3);margin-bottom:4px;padding:0 4px;letter-spacing:.2px;font-weight:500;}
.mtime{font-size:11px;color:var(--text4);margin-top:3px;padding:0 5px;}

/* bubbles */
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.55;max-width:80%;word-break:break-word;}
.bubble.note{background:var(--navy);color:#fff;border-radius:18px 4px 18px 18px;box-shadow:0 1px 4px rgba(27,46,75,.2);}
.bubble.question{background:var(--navy2);color:#fff;border-radius:18px 4px 18px 18px;box-shadow:0 1px 4px rgba(27,46,75,.2);}
.bubble.ai{background:#fff;color:var(--text);border-radius:4px 18px 18px 18px;border:1px solid var(--border);max-width:86%;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ai-tag{font-size:11px;color:var(--navy);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px;font-weight:700;}

/* form card */
.bubble.form-card{background:#fff;border:1px solid var(--border);border-top:3px solid var(--navy);border-radius:4px 18px 18px 18px;max-width:92%;padding:15px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.form-card-hd{font-size:15px;color:var(--navy);margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:7px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;}
.ff-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;font-weight:500;}
.ff-val{font-size:14px;color:var(--text);font-weight:500;margin-top:1px;}
.ff-full{grid-column:1/-1;}

/* reminder bubble */
.bubble.rem-bubble{
  background:#fff;border:1px solid var(--border);border-left:4px solid var(--navy);
  border-radius:18px 4px 18px 18px;max-width:86%;padding:12px 14px;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.rem-hd{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.rem-title{font-weight:700;font-size:15px;color:var(--navy);}
.rem-due{font-size:13px;color:var(--text2);margin-bottom:4px;}
.rem-note{font-size:14px;color:var(--text);}
.rem-actions{display:flex;gap:8px;margin-top:10px;}
.rem-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;}
.rem-btn.done-btn{background:var(--green-bg);color:var(--green);border-color:var(--green-border);}

/* typing */
.typing{display:flex;gap:5px;align-items:center;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:4px 18px 18px 18px;width:fit-content;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.tdot{width:7px;height:7px;background:var(--text3);border-radius:50%;animation:td 1.2s infinite;}
.tdot:nth-child(2){animation-delay:.2s;}.tdot:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── INPUT BAR ── */
.input-area{
  padding:10px 14px;
  padding-bottom:calc(10px + var(--safe-bottom));
  background:#fff;border-top:1px solid var(--border);flex-shrink:0;
}
.mode-row{display:flex;gap:7px;margin-bottom:9px;}
.mtab{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border2);background:#fff;color:var(--text3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;}
.mtab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.irow{display:flex;gap:9px;align-items:flex-end;}
.ibox{
  flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:22px;
  padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;
  resize:none;outline:none;min-height:46px;max-height:110px;line-height:1.5;
  transition:border-color .15s;
}
.ibox:focus{border-color:var(--navy);}
.ibox::placeholder{color:var(--text3);}
.send{
  width:46px;height:46px;border-radius:50%;border:none;flex-shrink:0;
  background:var(--navy);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(27,46,75,.3);transition:background .15s;
}
.send:active{background:var(--navy2);}
.send svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;margin-left:2px;}
.hint{font-size:12px;color:var(--text3);margin-top:7px;padding:0 4px;}

/* loading bar */
.lbar{height:2px;background:linear-gradient(90deg,transparent,var(--navy),transparent);background-size:200px 100%;animation:lb 1.4s infinite;flex-shrink:0;}
@keyframes lb{from{background-position:-200px 0}to{background-position:calc(100% + 200px) 0}}

/* ── EMPTY STATE ── */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 30px;background:var(--bg);}
.empty-chat svg{opacity:.15;}
.empty-chat h3{font-size:22px;font-weight:600;color:var(--text2);}
.empty-chat p{font-size:14px;color:var(--text3);text-align:center;line-height:1.7;max-width:260px;}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fIn .15s ease;}
@media(min-width:680px){.overlay{align-items:center;}}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{
  background:#fff;border-radius:24px 24px 0 0;
  width:100%;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  animation:sUp .22s ease;
  padding-bottom:env(safe-area-inset-bottom,0);
}
@media(min-width:680px){.modal{border-radius:18px;width:560px;max-width:95vw;max-height:90dvh;}}
@keyframes sUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

/* modal drag handle */
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.mhdr{padding:16px 20px 0;display:flex;justify-content:space-between;align-items:center;}
.mtitle{font-size:20px;font-weight:700;color:var(--navy);}
.mclose{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-weight:300;}
.mbody{padding:16px 20px 24px;}

.fsec{margin-bottom:18px;}
.fsec-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--navy);margin-bottom:11px;font-weight:700;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.frow.one{grid-template-columns:1fr;}
.fg{display:flex;flex-direction:column;gap:5px;}
.flabel{font-size:12px;color:var(--text2);font-weight:600;}
.finput{
  background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;
  padding:11px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;
  outline:none;width:100%;transition:border-color .15s;
}
.finput:focus{border-color:var(--navy);}
.finput::placeholder{color:var(--text3);}
select.finput{cursor:pointer;}
.factions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.fbtn{padding:12px 24px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.fbtn-navy{background:var(--navy);color:#fff;}
.fbtn-ghost{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border);}

.srow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.stag{padding:9px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;border:1.5px solid transparent;transition:all .15s;}

.rem-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.rem-item{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.rem-item.faded{opacity:.4;}

/* toast */
.toast{position:fixed;bottom:calc(100px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 22px;border-radius:50px;font-size:14px;z-index:999;white-space:nowrap;animation:sUp .2s ease;font-weight:600;box-shadow:0 4px 16px rgba(27,46,75,.3);}
</style>
</head>
<body>
<div class="app">

  <!-- ── CONTACTS SCREEN ── -->
  <div class="contacts-screen" id="contactsScreen">
    <div class="contacts-hdr">
      <div class="contacts-hdr-top">
        <div>
          <div class="brand-name">Deal CRM</div>
          <div class="brand-sub">Real Estate</div>
        </div>
        <div class="hdr-actions">
          <button class="hdr-icon-btn" onclick="openModal('intake')" title="Intake Form">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          </button>
          <button class="hdr-icon-btn" onclick="openModal('addClient')" title="New Client">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" placeholder="Search clients…" oninput="filterClients()"/>
      </div>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div class="clist" id="clientList"></div>
  </div>

  <!-- ── CHAT SCREEN ── -->
  <div class="chat-screen" id="chatScreen">
    <!-- header -->
    <div class="chat-hdr">
      <span class="back-btn" onclick="goBack()">‹</span>
      <div class="chat-ava" id="chatAva"></div>
      <div class="chat-hdr-info">
        <div class="chat-hdr-name" id="chatName"></div>
        <div class="chat-hdr-sub" id="chatSub"></div>
      </div>
      <div class="chat-hdr-right" id="chatHdrRight">
        <!-- chips + icon btns injected here -->
      </div>
    </div>

    <!-- empty or messages -->
    <div class="empty-chat" id="emptyChat">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <h3>No messages yet</h3>
      <p>Add a note or ask the AI a question about this client.</p>
    </div>

    <div id="lbar" class="lbar" style="display:none;"></div>
    <div class="chat-body" id="chatBody" style="display:none;"></div>

    <!-- input -->
    <div class="input-area">
      <div class="mode-row">
        <button class="mtab on" id="tabNote" onclick="setMode('note')">Note</button>
        <button class="mtab" id="tabAsk" onclick="setMode('ask')">Ask AI</button>
      </div>
      <div class="irow">
        <textarea class="ibox" id="msgInput" rows="1"
          placeholder="Write a note… or &quot;remind me to call Scott at 9am Saturday&quot;"
          oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="send" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="hint" id="inputHint">Tip: type "remind me to…" and a reminder card will be created automatically.</div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div id="modalOverlay" class="overlay" style="display:none;" onclick="overlayClick(event)">
  <div class="modal" id="modalBox"></div>
</div>
<div id="toast" class="toast" style="display:none;"></div>

<script>
// ── COLORS ────────────────────────────────────────────────────────────────────
const TYPE_COLORS={
  "Buyer":             {bg:"#E6F0FA",text:"#1A3A6A",border:"#90B8E0"},
  "Seller":            {bg:"#E6F4EC",text:"#1A5A30",border:"#90C8A8"},
  "Renter":            {bg:"#FFF3E6",text:"#7A3A10",border:"#E0B070"},
  "Landlord":          {bg:"#F0E6F8",text:"#4A1A70",border:"#C090E0"},
  "Relocation Client": {bg:"#E6F8F8",text:"#1A5A5A",border:"#80C8C8"},
  "Business Provider": {bg:"#F8F0E6",text:"#5A3A10",border:"#D0A860"},

const fRel=ts=>{
  if(!ts)return"";const m=Math.floor((Date.now()-new Date(ts))/60000);
  if(m<1)return"now";if(m<60)return m+"m";if(m<1440)return Math.floor(m/60)+"h";
  const d=Math.floor(m/1440);if(d<7)return d+"d";
  return new Date(ts).toLocaleDateString([],{month:"short",day:"numeric"});
};
const fDate=ts=>{
  if(!ts)return"";const d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/86400000);
  if(diff===0)return"Today";if(diff===1)return"Yesterday";
  if(diff<7)return d.toLocaleDateString([],{weekday:"long"});
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
};

function renderMsg(m){
  if(m.type==="form"){
    let c={};
    if(typeof m.content==="string"&&m.content.startsWith("{")){try{c=JSON.parse(m.content);}catch(e){}}
    else{c=clients.find(x=>x.id===m.content)||clients.find(x=>x.id===selectedId)||{};}
    const row=(l,v)=>v&&v!=="—"?`<div><div class="ff-label">${l}</div><div class="ff-val">${esc(v)}</div></div>`:"";
    const rowF=(l,v)=>v&&v!=="—"?`<div class="ff-full"><div class="ff-label">${l}</div><div class="ff-val">${esc(v)}</div></div>`:"";
    return `<div class="mw in"><div class="mlabel">Intake Form</div>
      <div class="bubble form-card">
        <div class="form-card-hd">Property Request</div>
        <div class="form-grid">
          ${row("Budget",c.budget)}${row("Type",c.propertyType)}
          ${row("Location",c.preferredLocation)}${row("Bedrooms",c.bedrooms)}
          ${row("Bathrooms",c.bathrooms)}${row("Parking",c.parking)}
          ${row("Lot Size",c.lotSize)}${row("Construction",c.constructionSize)}
          ${rowF("Amenities",c.amenities)}${rowF("Other Features / Comments",c.otherFeatures)}
        </div>
      </div>
      <div class="mtime">${fTime(m.timestamp)}</div></div>`;
  }
  if(m.type==="reminder"){
    const r=reminders[m.content]||{};const done=r.done||false;
    return `<div class="mw out">
      <div class="bubble rem-bubble">
        <div class="rem-hd"><span style="font-size:19px;">⏰</span><span class="rem-title">${esc(r.title||"Reminder")}</span></div>
        <div class="rem-due">${esc(r.dueDate||"")}${r.dueTime?" · "+esc(r.dueTime):""}</div>
        ${r.note?`<div class="rem-note">${esc(r.note)}</div>`:""}
        <div class="rem-actions">
          <button class="rem-btn${done?" done-btn":""}" onclick="${done?"":"markDone('"+r.id+"')"}">${done?"✓ Completed":"✓ Mark Done"}</button>
        </div>
      </div>
      <div class="mtime">${fTime(m.timestamp)}</div></div>`;
  }
  if(m.type==="ai")return`<div class="mw in"><div class="bubble ai"><div class="ai-tag">AI Assistant</div><div>${esc(m.content)}</div></div><div class="mtime">${fTime(m.timestamp)}</div></div>`;
  if(m.type==="note")return`<div class="mw out"><div class="bubble note">${esc(m.content)}</div><div class="mtime">${fTime(m.timestamp)}</div></div>`;
  if(m.type==="question")return`<div class="mw out"><div class="bubble question">${esc(m.content)}</div><div class="mtime">${fTime(m.timestamp)}</div></div>`;
  return"";
}

function appendMsg(m){
  const body=document.getElementById("chatBody");

}

// ── SEND ──────────────────────────────────────────────────────────────────────
const REM_SYS=`You are a reminder parser for a real estate CRM.
Determine if the user message is requesting a reminder (e.g. "remind me to call Scott at 9am Saturday").
If YES, return ONLY this JSON (no markdown): {"isReminder":true,"title":"...","dueDate":"...","dueTime":"...","note":"..."}
If NO, return ONLY: {"isReminder":false}
dueDate: natural language (Saturday, Monday, Tomorrow, June 10). dueTime: "9:00 AM" format or "". Title: concise action. Extra context in note.`;

async function sendMessage(){
  const inp=document.getElementById("msgInput");
  const text=inp.value.trim();
  if(!text||!selectedId||isLoading)return;
  inp.value="";autoResize(inp);

  if(inputMode==="note"){
    setLoading(true);
    let parsed={isReminder:false};
    try{const raw=await callClaude(REM_SYS,text,200);parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());}catch(e){}
    setLoading(false);
    if(parsed.isReminder){
      const rid="r_"+Date.now();
      const rem={id:rid,clientId:selectedId,title:parsed.title,dueDate:parsed.dueDate,dueTime:parsed.dueTime,note:parsed.note||"",done:false,createdAt:new Date().toISOString()};
      reminders[rid]=rem;
      const msg={id:"m_"+Date.now(),clientId:selectedId,type:"reminder",content:rid,timestamp:new Date().toISOString()};
      if(!messages[selectedId])messages[selectedId]=[];
      messages[selectedId].push(msg);appendMsg(msg);updateRemBtn();renderClientList();showToast("⏰ Reminder set");
    } else {
      const msg={id:"m_"+Date.now(),clientId:selectedId,type:"note",content:text,timestamp:new Date().toISOString()};
      if(!messages[selectedId])messages[selectedId]=[];
      messages[selectedId].push(msg);appendMsg(msg);renderClientList();
    }
  } else {
    const qMsg={id:"m_"+Date.now(),clientId:selectedId,type:"question",content:text,timestamp:new Date().toISOString()};
    if(!messages[selectedId])messages[selectedId]=[];
    messages[selectedId].push(qMsg);appendMsg(qMsg);
    showTyping();
    const c=clients.find(x=>x.id===selectedId)||{};
    const history=(messages[selectedId]||[]).map(m=>`[${m.type==="form"?"System":"You"}]: ${m.type==="form"?"[Intake form]":m.type==="reminder"?"[Reminder: "+(reminders[m.content]?.title||"")+" on "+(reminders[m.content]?.dueDate||"")+"]":m.content}`).join("\n");
    const answer=await callClaude(`You are an intelligent real estate CRM assistant. Answer questions about this client based on their profile and history. Be concise and accurate.`,`Client:\n${JSON.stringify(c,null,2)}\n\nHistory:\n${history}\n\nQuestion: ${text}`);
    hideTyping();
    const aMsg={id:"m_"+(Date.now()+1),clientId:selectedId,type:"ai",content:answer,timestamp:new Date().toISOString()};
    messages[selectedId].push(aMsg);appendMsg(aMsg);
  }
}

async function callClaude(system,user,maxTokens=800){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system,messages:[{role:"user",content:user}]})});
    const data=await res.json();return data.content?.find(b=>b.type==="text")?.text||"";
  }catch(e){return"Error: "+e.message;}
}

    <div class="factions">
      <button class="fbtn fbtn-ghost" onclick="closeModal()">Cancel</button>
      <button class="fbtn fbtn-navy" onclick="${submitFn}()">${btnLabel}</button>
    </div>
  </div>`;
}

function getFormData(){
  const fields=["fullName","email","phone","budget","propertyType","preferredLocation","bedrooms","bathrooms","lotSize","constructionSize","parking","amenities","otherFeatures","clientType","status"];
  const d={};fields.forEach(f=>{const el=document.getElementById("f_"+f);if(el)d[f]=el.value.trim();});return d;
}
function handleAddClient(){
  const d=getFormData();if(!d.fullName)return;
  const id="c_"+Date.now(),c={...d,id,createdAt:new Date().toISOString()};
  clients.unshift(c);
  const msg={id:"m_"+Date.now(),clientId:id,type:"form",content:JSON.stringify(c),timestamp:new Date().toISOString()};
  messages[id]=[msg];closeModal();selectClient(id);renderClientList();showToast("Client created");
}
function handleIntake(){
  const d=getFormData();if(!d.fullName)return;
  const id="c_"+Date.now(),c={...d,id,createdAt:new Date().toISOString()};
  const msg={id:"m_"+Date.now(),clientId:id,type:"form",content:JSON.stringify(c),timestamp:new Date().toISOString()};
  clients.unshift(c);messages[id]=[msg];closeModal();selectClient(id);renderClientList();showToast("Intake submitted");
}

function remindersHTML(){
  const cRems=Object.values(reminders).filter(r=>r.clientId===selectedId);
  const items=cRems.length?cRems.map(r=>`
    <div class="rem-item${r.done?" faded":""}">
      <div style="flex:1;">
        <div style="font-weight:700;color:var(--navy);font-size:15px;">${esc(r.title)}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:3px;">${esc(r.dueDate)}${r.dueTime?" · "+esc(r.dueTime):""}</div>
        ${r.note?`<div style="font-size:13px;color:var(--text);margin-top:5px;">${esc(r.note)}</div>`:""}
      </div>
      ${!r.done?`<button class="rem-btn" onclick="markDoneFromModal('${r.id}')">✓ Done</button>`:`<button class="rem-btn done-btn">✓</button>`}
    </div>`).join(""):`<p style="color:var(--text3);font-size:14px;margin-bottom:16px;">No reminders yet.</p>`;
  return `<div class="modal-handle"></div>
  <div class="mhdr"><div class="mtitle">⏰ Reminders</div><button class="mclose" onclick="closeModal()">×</button></div>
  <div class="mbody"><div class="rem-list">${items}</div>
  <button class="fbtn fbtn-navy" style="width:100%;" onclick="openModal('remForm')">+ Add Reminder</button></div>`;
}
function markDoneFromModal(rid){if(reminders[rid])reminders[rid].done=true;renderMessages();updateRemBtn();renderClientList();openModal("reminders");}

function reminderFormHTML(){
  return `<div class="modal-handle"></div>
  <div class="mhdr"><div class="mtitle">⏰ New Reminder</div><button class="mclose" onclick="closeModal()">×</button></div>
  <div class="mbody">
    <div class="fg" style="margin-bottom:13px;"><label class="flabel">Title *</label><input class="finput" id="rf_title" placeholder="e.g. Follow up on budget" style="margin-top:5px;"></div>
    <div class="frow" style="margin-bottom:13px;">
      <div class="fg"><label class="flabel">Date *</label><input class="finput" id="rf_date" placeholder="Saturday, June 10…" style="margin-top:5px;"></div>
      <div class="fg"><label class="flabel">Time</label><input class="finput" id="rf_time" placeholder="9:00 AM" style="margin-top:5px;"></div>
    </div>
    <div class="fg" style="margin-bottom:16px;"><label class="flabel">Note (optional)</label><textarea class="finput" id="rf_note" rows="3" style="margin-top:5px;resize:none;" placeholder="Additional context…"></textarea></div>
    <div id="rf_error" style="color:#C00;font-size:13px;margin-bottom:10px;display:none;">Please fill in Title and Date.</div>
    <div class="factions">
      <button class="fbtn fbtn-ghost" onclick="openModal('reminders')">Back</button>
      <button class="fbtn fbtn-navy" onclick="saveReminder()">Add Reminder</button>
    </div>
  </div>`;
}
function saveReminder(){
  const title=(document.getElementById("rf_title")?.value||"").trim();
  const dueDate=(document.getElementById("rf_date")?.value||"").trim();
  const dueTime=(document.getElementById("rf_time")?.value||"").trim();
  const note=(document.getElementById("rf_note")?.value||"").trim();
  if(!title||!dueDate){const e=document.getElementById("rf_error");if(e)e.style.display="block";return;}
  const rid="r_"+Date.now();
  reminders[rid]={id:rid,clientId:selectedId,title,dueDate,dueTime,note,done:false,createdAt:new Date().toISOString()};
  const msg={id:"m_"+(Date.now()+1),clientId:selectedId,type:"reminder",content:rid,timestamp:new Date().toISOString()};
  if(!messages[selectedId])messages[selectedId]=[];
  messages[selectedId].push(msg);
  closeModal();appendMsg(msg);updateRemBtn();renderClientList();showToast("⏰ Reminder added");
}

function labelsHTML(){
  const c=clients.find(x=>x.id===selectedId)||{};
  const typeBtns=CLIENT_TYPES.map(t=>{
    const col=TYPE_COLORS[t]||{bg:"#F0F0F0",text:"#606060",border:"#D0D0D0"};
    const sel=c.clientType===t;
    return `<button class="stag" onclick="setLabel('clientType','${t}')" style="background:${sel?col.bg:"#F5F5F5"};color:${sel?col.text:"#909090"};border-color:${sel?col.border:"#E0E0E0"};">${t}</button>`;
  }).join("");
  const statBtns=CLIENT_STATUSES.map(s=>{
    const col=STATUS_COLORS[s]||{bg:"#F0F0F0",text:"#606060",border:"#D0D0D0"};
    const sel=c.status===s;
    return `<button class="stag" onclick="setLabel('status','${s}')" style="background:${sel?col.bg:"#F5F5F5"};color:${sel?col.text:"#909090"};border-color:${sel?col.border:"#E0E0E0"};">${s}</button>`;
  }).join("");
  return `<div class="modal-handle"></div>
  <div class="mhdr"><div class="mtitle">🏷 Labels</div><button class="mclose" onclick="closeModal()">×</button></div>
  <div class="mbody">
    <div style="margin-bottom:22px;"><div class="fsec-title">Client Type</div><div class="srow">${typeBtns}</div></div>
    <div><div class="fsec-title">Status</div><div class="srow">${statBtns}</div></div>
    <div class="factions"><button class="fbtn fbtn-navy" onclick="closeModal()">Done</button></div>
  </div>`;
}
function setLabel(field,val){
  const c=clients.find(x=>x.id===selectedId);if(!c)return;
  c[field]=val;
  // update header chip
  const right=document.getElementById("chatHdrRight");
  if(right&&field==="clientType"){
    const col=TYPE_COLORS[val]||{bg:"rgba(255,255,255,.2)",text:"#fff",border:"transparent"};
    const chip=right.querySelector(".hdr-chip-sm");
    if(chip){chip.textContent=val;chip.style.cssText=cs(val,TYPE_COLORS);}
  }
  renderClientList();openModal("labels");
}

function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";
  setTimeout(()=>t.style.display="none",2800);
}
</script>
</body>
</html>
