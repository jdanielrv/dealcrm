  --text:#0D1B2A;--text2:#3A5068;--text3:#7A90A8;--text4:#B0C4D8;
  --border:#D4DEE8;--border2:#C0CED8;
  --red:#C0392B;--red-bg:#FDECEA;--red-border:#E8A8A0;
  --green:#1A7A40;--green-bg:#E8F5EE;--green-border:#90CCA8;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

.app{position:relative;width:100vw;height:100dvh;overflow:hidden;display:flex;}

/* ── CONTACTS SCREEN ── */
.contacts-screen{width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0;}

/* ── CHAT SCREEN ── */
.chat-screen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;background:var(--bg);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:10;
}
.chat-screen.open{transform:translateX(0);}

@media(min-width:680px){
  .contacts-screen{width:320px;min-width:320px;border-right:1px solid var(--border);flex-shrink:0;}
  .chat-screen{position:relative;transform:none !important;flex:1;}
}

/* ── CONTACTS HEADER ── */
.contacts-hdr{
  padding-top:calc(var(--safe-top) + 0px);padding-bottom:14px;
  padding-left:18px;padding-right:18px;background:#0a2e0a;
  overflow:hidden;
}
.contacts-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.brand-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.brand-sub{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.8px;text-transform:uppercase;margin-top:1px;}
.hdr-actions{display:flex;gap:8px;}
.hdr-icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:none;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;}
.search-wrap{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.12);border-radius:12px;padding:9px 14px;}
.search-wrap svg{width:15px;height:15px;stroke:rgba(255,255,255,.6);fill:none;stroke-width:2;flex-shrink:0;}
.search-wrap input{background:none;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;width:100%;}
.search-wrap input::placeholder{color:rgba(255,255,255,.45);}

/* filter pills */
.filter-row{display:flex;gap:6px;padding:10px 18px;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);}
.filter-row::-webkit-scrollbar{display:none;}
.fpill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);flex-shrink:0;}
.fpill.on{background:var(--navy);color:#fff;border-color:var(--navy);}

/* contact list */
.clist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg2);}

/* swipeable contact item */
.citem-wrap{position:relative;overflow:hidden;}
.citem-delete-bg{
  position:absolute;right:0;top:0;bottom:0;width:90px;
  background:var(--red);display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:3px;color:#fff;font-size:11px;font-weight:600;
  letter-spacing:.3px;cursor:pointer;user-select:none;
}
.citem-delete-bg svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.citem{
  display:flex;align-items:center;gap:13px;
  padding:13px 18px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:transform .22s ease,background .1s;position:relative;
  background:var(--bg2);
  /* swipe support */
  touch-action:pan-y;
}
.citem:active{background:var(--bg3);}
.citem.sel{background:var(--bg3);}
.citem-ava{
  width:50px;height:50px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;color:#fff;letter-spacing:-.5px;
}
.citem-body{flex:1;min-width:0;}
.citem-row1{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:3px;}
.citem-name{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.citem-time{font-size:12px;color:var(--text3);flex-shrink:0;}
.citem-row2{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.citem-sub{font-size:13px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.citem-badges{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.rem-badge{background:var(--navy);color:#fff;border-radius:50%;width:20px;height:20px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.citem-chips{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.chip{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;letter-spacing:.2px;text-transform:uppercase;}

/* ── CHAT HEADER ── */
.chat-hdr{
  padding-top:calc(var(--safe-top) + 10px);padding-bottom:12px;
  padding-left:12px;padding-right:16px;background:var(--navy);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.back-btn{color:#fff;font-size:28px;cursor:pointer;padding:4px 6px 4px 2px;line-height:1;font-weight:300;flex-shrink:0;}
.chat-ava{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.chat-hdr-info{flex:1;min-width:0;cursor:pointer;}
.chat-hdr-name{font-size:17px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-hdr-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-hdr-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.chat-icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:none;cursor:pointer;color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;position:relative;}
.ibadge{position:absolute;top:-3px;right:-3px;background:#E8C84A;color:#0D1B2A;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.chat-icon-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* client info panel (tap name) */
.info-panel{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:14px 18px;flex-shrink:0;display:none;
  animation:slideDown .2s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.info-panel.open{display:block;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-field{display:flex;flex-direction:column;gap:2px;}
.info-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;}
.info-val{font-size:14px;color:var(--text);font-weight:500;}
.info-val a{color:var(--navy);text-decoration:none;font-weight:600;}

/* ── CHAT BODY ── */
.chat-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 10px;display:flex;flex-direction:column;gap:8px;background:var(--bg);background-image:radial-gradient(circle at 20% 30%,rgba(27,46,75,.04) 0%,transparent 60%),radial-gradient(circle at 80% 70%,rgba(27,46,75,.03) 0%,transparent 60%);}
.date-div{display:flex;align-items:center;gap:10px;margin:6px 0;}
.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:var(--border);}
.date-div span{font-size:11px;color:var(--text3);white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;background:var(--bg);padding:0 6px;}
.mw{display:flex;flex-direction:column;max-width:100%;}
.mw.out{align-items:flex-end;}.mw.in{align-items:flex-start;}
.mlabel{font-size:11px;color:var(--text3);margin-bottom:4px;padding:0 4px;letter-spacing:.2px;font-weight:500;}
.mtime{font-size:11px;color:var(--text4);margin-top:3px;padding:0 5px;}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.55;max-width:80%;word-break:break-word;}
.bubble.note{background:var(--navy);color:#fff;border-radius:18px 4px 18px 18px;box-shadow:0 1px 4px rgba(27,46,75,.2);}
.bubble.question{background:var(--navy2);color:#fff;border-radius:18px 4px 18px 18px;box-shadow:0 1px 4px rgba(27,46,75,.2);}
.bubble.ai{background:#fff;color:var(--text);border-radius:4px 18px 18px 18px;border:1px solid var(--border);max-width:86%;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ai-tag{font-size:11px;color:var(--navy);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px;font-weight:700;}
.bubble.form-card{background:#fff;border:1px solid var(--border);border-top:3px solid var(--navy);border-radius:4px 18px 18px 18px;max-width:92%;padding:15px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.form-card-hd{font-size:15px;color:var(--navy);margin-bottom:12px;font-weight:700;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;}
.ff-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;font-weight:500;}
.ff-val{font-size:14px;color:var(--text);font-weight:500;margin-top:1px;}
.ff-full{grid-column:1/-1;}
.bubble.rem-bubble{background:#fff;border:1px solid var(--border);border-left:4px solid var(--navy);border-radius:18px 4px 18px 18px;max-width:86%;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.rem-hd{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.rem-title{font-weight:700;font-size:15px;color:var(--navy);}
.rem-due{font-size:13px;color:var(--text2);margin-bottom:4px;}
.rem-note{font-size:14px;color:var(--text);}
.rem-actions{display:flex;gap:8px;margin-top:10px;}
.rem-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;}
.rem-btn.done-btn{background:var(--green-bg);color:var(--green);border-color:var(--green-border);}
.typing{display:flex;gap:5px;align-items:center;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:4px 18px 18px 18px;width:fit-content;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.tdot{width:7px;height:7px;background:var(--text3);border-radius:50%;animation:td 1.2s infinite;}
.tdot:nth-child(2){animation-delay:.2s;}.tdot:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── INPUT ── */
.input-area{padding:10px 14px;padding-bottom:calc(10px + var(--safe-bottom));background:#fff;border-top:1px solid var(--border);flex-shrink:0;}
.mode-row{display:flex;gap:7px;margin-bottom:9px;}
.mtab{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border2);background:#fff;color:var(--text3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;}
.mtab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.irow{display:flex;gap:9px;align-items:flex-end;}
.ibox{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:22px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;resize:none;outline:none;min-height:46px;max-height:110px;line-height:1.5;transition:border-color .15s;}
.ibox:focus{border-color:var(--navy);}
.ibox::placeholder{color:var(--text3);}
.send{width:46px;height:46px;border-radius:50%;border:none;flex-shrink:0;background:var(--navy);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(27,46,75,.3);}
.send svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;margin-left:2px;}
.hint{font-size:12px;color:var(--text3);margin-top:7px;padding:0 4px;}
.lbar{height:2px;background:linear-gradient(90deg,transparent,var(--navy),transparent);background-size:200px 100%;animation:lb 1.4s infinite;flex-shrink:0;}
@keyframes lb{from{background-position:-200px 0}to{background-position:calc(100% + 200px) 0}}

/* empty state */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 30px;background:var(--bg);}
.empty-chat svg{opacity:.15;}.empty-chat h3{font-size:22px;font-weight:600;color:var(--text2);}
.empty-chat p{font-size:14px;color:var(--text3);text-align:center;line-height:1.7;max-width:260px;}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fIn .15s ease;}
@media(min-width:680px){.overlay{align-items:center;}}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:sUp .22s ease;padding-bottom:env(safe-area-inset-bottom,0);}
@media(min-width:680px){.modal{border-radius:18px;width:560px;max-width:95vw;max-height:90dvh;}}
@keyframes sUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.mhdr{padding:16px 20px 0;display:flex;justify-content:space-between;align-items:center;}
.mtitle{font-size:20px;font-weight:700;color:var(--navy);}
.mclose{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.mbody{padding:16px 20px 24px;}
.fsec{margin-bottom:18px;}
.fsec-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--navy);margin-bottom:11px;font-weight:700;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.frow.one{grid-template-columns:1fr;}
.fg{display:flex;flex-direction:column;gap:5px;}
.flabel{font-size:12px;color:var(--text2);font-weight:600;}
.finput{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;width:100%;transition:border-color .15s;}
.finput:focus{border-color:var(--navy);}
.finput::placeholder{color:var(--text3);}
select.finput{cursor:pointer;}
.factions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.fbtn{padding:12px 24px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.fbtn-navy{background:var(--navy);color:#fff;}
.fbtn-ghost{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border);}
.fbtn-red{background:var(--red);color:#fff;}
.srow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.stag{padding:9px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;border:1.5px solid transparent;transition:all .15s;}
.rem-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.rem-item{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.rem-item.faded{opacity:.4;}

/* confirm delete */
.confirm-box{background:var(--red-bg);border:1px solid var(--red-border);border-radius:12px;padding:16px;margin-bottom:16px;}
.confirm-box p{font-size:14px;color:var(--text);line-height:1.6;}
.confirm-box strong{color:var(--red);}

/* toast */
.toast{position:fixed;bottom:calc(100px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 22px;border-radius:50px;font-size:14px;z-index:999;white-space:nowrap;animation:sUp .2s ease;font-weight:600;box-shadow:0 4px 16px rgba(27,46,75,.3);}
</style>

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>

      <div class="search-wrap">

    <div class="filter-row" id="filterRow"></div>

  <!-- ── CHAT SCREEN ── -->
  <div class="chat-screen" id="chatScreen">
    <div class="chat-hdr">
      <span class="back-btn" onclick="goBack()">‹</span>
      <div class="chat-ava" id="chatAva"></div>
      <div class="chat-hdr-info" onclick="toggleInfoPanel()">
        <div class="chat-hdr-name" id="chatName"></div>
        <div class="chat-hdr-sub" id="chatSub">Tap to see contact info</div>
      </div>
      <div class="chat-hdr-right" id="chatHdrRight"></div>
    </div>

    <!-- contact info panel (tap name to expand) -->
    <div class="info-panel" id="infoPanel"></div>

    <div class="empty-chat" id="emptyChat">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <h3>No messages yet</h3>
      <p>Add a note or ask the AI a question about this client.</p>
    </div>

    <div id="lbar" class="lbar" style="display:none;"></div>
    <div class="chat-body" id="chatBody" style="display:none;"></div>

    <div class="input-area">
      <div class="mode-row">
        <button class="mtab on" id="tabNote" onclick="setMode('note')">Note</button>
        <button class="mtab" id="tabAsk" onclick="setMode('ask')">Ask AI</button>
      </div>
      <div class="irow">
        <textarea class="ibox" id="msgInput" rows="1"
          placeholder="Write a note… or &quot;remind me to call Scott at 9am Saturday&quot;"
          oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="send" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="hint" id="inputHint">Tip: type "remind me to…" and a reminder card will be created automatically.</div>
    </div>
  </div>
</div>

<div id="modalOverlay" class="overlay" style="display:none;" onclick="overlayClick(event)">
  <div class="modal" id="modalBox"></div>
</div>
<div id="toast" class="toast" style="display:none;"></div>

<script>
// ── COLORS ────────────────────────────────────────────────────────────────────
const TYPE_COLORS={
  "Buyer":             {bg:"#E6F0FA",text:"#1A3A6A",border:"#90B8E0"},
  "Seller":            {bg:"#E6F4EC",text:"#1A5A30",border:"#90C8A8"},
  "Renter":            {bg:"#FFF3E6",text:"#7A3A10",border:"#E0B070"},
  "Landlord":          {bg:"#F0E6F8",text:"#4A1A70",border:"#C090E0"},
  "Relocation Client": {bg:"#E6F8F8",text:"#1A5A5A",border:"#80C8C8"},
  "Business Provider": {bg:"#F8F0E6",text:"#5A3A10",border:"#D0A860"},
};
const STATUS_COLORS={
  "New Lead":    {bg:"#FFF8E0",text:"#7A5A00",border:"#E0C840"},
  "In Progress": {bg:"#E6F4EC",text:"#1A5A30",border:"#80C8A0"},
  "On Hold":     {bg:"#F0F0F0",text:"#505050",border:"#C0C0C0"},
  "Closed":      {bg:"#E6EEF8",text:"#1A2E6A",border:"#90A8D8"},
  "Lost":        {bg:"#F8E6E6",text:"#6A1A1A",border:"#D89090"},
};
const CLIENT_TYPES=["Buyer","Seller","Renter","Landlord","Relocation Client","Business Provider"];
const CLIENT_STATUSES=["New Lead","In Progress","On Hold","Closed","Lost"];
const AVA_COLORS=["#1B3A6B","#1B5E3A","#6B1B3A","#3A1B6B","#1B4A5E","#5E3A1B"];
const avaColor=id=>{let h=0;for(let c of(id||""))h=(h*31+c.charCodeAt(0))&0xFFFFFFFF;return AVA_COLORS[Math.abs(h)%AVA_COLORS.length];};

// ── DATA — localStorage persistence ──────────────────────────────────────────
const NOW=Date.now();
const D=m=>new Date(NOW-m*60000).toISOString();

// Default sample data (only used if localStorage is empty)
const DEFAULT_CLIENTS=[
  {id:"c1",fullName:"Scott Mitchell",email:"scott.mitchell@gmail.com",phone:"+1 305 844 2201",budget:"$450,000–$600,000",propertyType:"House",preferredLocation:"Tamarindo, Guanacaste",bedrooms:"3",bathrooms:"2.5",lotSize:"600 m²",constructionSize:"280 m²",parking:"2",amenities:"Pool, Ocean view, Gated community",otherFeatures:"Home office. Pre-approval letter confirmed.",clientType:"Buyer",status:"In Progress",createdAt:D(2880)},
];
const DEFAULT_MESSAGES={
  c1:[
    {id:"m1",clientId:"c1",type:"form",content:"c1",timestamp:D(2880)},
    {id:"m2",clientId:"c1",type:"note",content:"Scott called — very motivated, wants to visit Tamarindo next month. His wife prefers something with a view.",timestamp:D(2100)},
    {id:"m3",clientId:"c1",type:"question",content:"Has Scott provided a budget and a flight date?",timestamp:D(1440)},
    {id:"m4",clientId:"c1",type:"ai",content:"Yes — Scott's budget is $450,000–$600,000 with a bank pre-approval. He hasn't confirmed exact flight dates yet, only that he plans to visit Tamarindo next month.",timestamp:D(1439)},
    {id:"m5",clientId:"c1",type:"reminder",content:"r1",timestamp:D(60)},
  ],
};
const DEFAULT_REMINDERS={
  r1:{id:"r1",clientId:"c1",title:"Call Scott",dueDate:"Saturday",dueTime:"9:00 AM",note:"Check if he reviewed the Tamarindo Hills listings",done:false},
};

// Load from localStorage or fall back to defaults
function loadData(){
  try{
    const sc=localStorage.getItem("dealcrm_clients");
    const sm=localStorage.getItem("dealcrm_messages");
    const sr=localStorage.getItem("dealcrm_reminders");
    return {
      clients: sc ? JSON.parse(sc) : DEFAULT_CLIENTS,
      messages: sm ? JSON.parse(sm) : DEFAULT_MESSAGES,
      reminders: sr ? JSON.parse(sr) : DEFAULT_REMINDERS,
    };
  }catch(e){
    return {clients:DEFAULT_CLIENTS,messages:DEFAULT_MESSAGES,reminders:DEFAULT_REMINDERS};
  }
}

// Save everything to localStorage
function saveData(){
  try{
    localStorage.setItem("dealcrm_clients", JSON.stringify(clients));
    localStorage.setItem("dealcrm_messages", JSON.stringify(messages));
    localStorage.setItem("dealcrm_reminders", JSON.stringify(reminders));
  }catch(e){console.warn("Storage full:",e);}
}

const _loaded = loadData();
let clients   = _loaded.clients;
let messages  = _loaded.messages;
let reminders = _loaded.reminders;

let selectedId=null,inputMode="note",currentFilter="All",isLoading=false,infoPanelOpen=false;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const ini=n=>(n||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
const fTime=ts=>ts?new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
const fRel=ts=>{
  if(!ts)return"";const m=Math.floor((Date.now()-new Date(ts))/60000);
  if(m<1)return"now";if(m<60)return m+"m";if(m<1440)return Math.floor(m/60)+"h";
  const d=Math.floor(m/1440);if(d<7)return d+"d";
  return new Date(ts).toLocaleDateString([],{month:"short",day:"numeric"});
};
const fDate=ts=>{
  if(!ts)return"";const d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/86400000);
  if(diff===0)return"Today";if(diff===1)return"Yesterday";
  if(diff<7)return d.toLocaleDateString([],{weekday:"long"});
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
};
const cs=(l,map)=>{const c=map[l];return c?`background:${c.bg};color:${c.text};border:1px solid ${c.border}`:"background:#F0F0F0;color:#606060;border:1px solid #D0D0D0";};
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");

// ── REMINDER FIRE CHECKER ─────────────────────────────────────────────────────
// Checks every minute if any reminder is due and posts an alert message to chat
const firedReminders = new Set(); // track which ones already fired this session

function startReminderChecker(){
  checkReminders(); // run once immediately
  setInterval(checkReminders, 60000); // then every 60 seconds
}

function checkReminders(){
  const now = new Date();
  const todayName = now.toLocaleDateString([],{weekday:"long"}).toLowerCase();
  const todayDate = now.toLocaleDateString([],{month:"long",day:"numeric"}).toLowerCase();
  const todayShort = now.toLocaleDateString([],{month:"short",day:"numeric"}).toLowerCase();

  Object.values(reminders).forEach(r => {
    if(r.done || firedReminders.has(r.id)) return;

    // check if today matches the reminder's dueDate
    const rd = (r.dueDate||"").toLowerCase();
    const isToday = rd === "today" || rd === "hoy"
      || rd === todayName
      || rd.includes(todayDate)
      || rd.includes(todayShort)
      || rd.includes(now.toLocaleDateString([],{month:"numeric",day:"numeric"}));
    if(!isToday) return;

    // check if the time has arrived (or no time set — fire at start of day)
    let timeDue = true;
    if(r.dueTime){
      const match = r.dueTime.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
      if(match){
        let h = parseInt(match[1]);
        const m = parseInt(match[2]||"0");
        const ampm = (match[3]||"").toUpperCase();
        if(ampm==="PM" && h!==12) h+=12;
        if(ampm==="AM" && h===12) h=0;
        const dueMinutes = h*60+m;
        const nowMinutes = now.getHours()*60+now.getMinutes();
        timeDue = nowMinutes >= dueMinutes;
      }
    }
    if(!timeDue) return;

    // fire the reminder — post a system alert message in that client's chat
    firedReminders.add(r.id);
    const alertMsg = {
      id:"m_fired_"+Date.now(),
      clientId:r.clientId,
      type:"reminder_alert",
      content:r.id,
      timestamp:new Date().toISOString()
    };
    if(!messages[r.clientId]) messages[r.clientId]=[];
    messages[r.clientId].push(alertMsg);
    saveData();

    // if this client is currently open, append it live
    if(selectedId===r.clientId){
      appendMsg(alertMsg);
    }

    // update sidebar badge and show toast
    renderClientList();
    if(selectedId===r.clientId) updateRemBtn();

    // show toast even if the chat is not open
    const c = clients.find(x=>x.id===r.clientId);
    showToast(`⏰ ${r.title}${c?" — "+c.fullName:""}`);

    // browser notification if granted
    if(Notification.permission==="granted"){
      new Notification("Deal CRM — Reminder", {
        body: `${r.title}${c?" · "+c.fullName:""}`,
        icon: ""
      });
    }
  });
}

// request notification permission on load (user must have interacted first)
function requestNotifPermission(){
  if("Notification" in window && Notification.permission==="default"){
    Notification.requestPermission();
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.onload=()=>{buildFilters();renderClientList();initSwipe();startReminderChecker();};

function buildFilters(){
  document.getElementById("filterRow").innerHTML=
    ["All",...CLIENT_TYPES,...CLIENT_STATUSES].map(f=>
      `<button class="fpill${f===currentFilter?" on":""}" onclick="setFilter('${f}')">${f}</button>`).join("");
}
function setFilter(f){currentFilter=f;buildFilters();renderClientList();}
function filterClients(){renderClientList();}

function renderClientList(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const filtered=clients.filter(c=>{
    const ms=!q||c.fullName.toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q);
    const mf=currentFilter==="All"||c.clientType===currentFilter||c.status===currentFilter;
    return ms&&mf;
  });
  document.getElementById("clientList").innerHTML=filtered.map(c=>{
    const pr=Object.values(reminders).filter(r=>r.clientId===c.id&&!r.done).length;
    const color=avaColor(c.id);
    const lastMsg=(messages[c.id]||[]).slice(-1)[0];
    const preview=lastMsg?(lastMsg.type==="form"?"Intake form received":lastMsg.type==="reminder"?"⏰ Reminder set":(lastMsg.content||"")):"No messages yet";
    return `<div class="citem-wrap" id="wrap_${c.id}">
      <div class="citem-delete-bg" onclick="confirmDelete('${c.id}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        Delete
      </div>
      <div class="citem${c.id===selectedId?" sel":""}" id="citem_${c.id}" onclick="selectClient('${c.id}')">
        <div class="citem-ava" style="background:${color}">${ini(c.fullName)}</div>
        <div class="citem-body">
          <div class="citem-row1">
            <span class="citem-name">${esc(c.fullName)}</span>
            <span class="citem-time">${fRel(c.createdAt)}</span>
          </div>
          <div class="citem-row2">
            <span class="citem-sub">${esc(preview)}</span>
            <div class="citem-badges">${pr>0?`<div class="rem-badge">⏰</div>`:""}</div>
          </div>
          <div class="citem-chips">
            ${c.clientType?`<span class="chip" style="${cs(c.clientType,TYPE_COLORS)}">${c.clientType}</span>`:""}
            ${c.status?`<span class="chip" style="${cs(c.status,STATUS_COLORS)}">${c.status}</span>`:""}
          </div>
        </div>
      </div>
    </div>`;
  }).join("")||`<div style="padding:30px;text-align:center;color:var(--text3);font-size:14px;">No clients yet. Tap + to add one.</div>`;
}

// ── SWIPE TO DELETE ───────────────────────────────────────────────────────────
function initSwipe(){
  document.getElementById("clientList").addEventListener("touchstart",onTouchStart,{passive:true});
  document.getElementById("clientList").addEventListener("touchmove",onTouchMove,{passive:false});
  document.getElementById("clientList").addEventListener("touchend",onTouchEnd);
}
let touchStartX=0,touchStartY=0,swipingEl=null,swipeActive=false;

function onTouchStart(e){
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  swipingEl=e.target.closest(".citem");
  swipeActive=false;
}
function onTouchMove(e){
  if(!swipingEl)return;
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  if(!swipeActive&&Math.abs(dy)>Math.abs(dx))return; // vertical scroll
  swipeActive=true;
  if(dx<0){
    e.preventDefault();
    const x=Math.max(dx,-90);
    swipingEl.style.transform=`translateX(${x}px)`;
  } else if(swipingEl.style.transform){
    swipingEl.style.transform="translateX(0)";
  }
}
function onTouchEnd(e){
  if(!swipingEl||!swipeActive)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(dx<-50){
    swipingEl.style.transform="translateX(-90px)";
  } else {
    swipingEl.style.transform="translateX(0)";
  }
  swipingEl=null;swipeActive=false;
}
function resetSwipe(){
  document.querySelectorAll(".citem").forEach(el=>el.style.transform="translateX(0)");
}

// ── DELETE ────────────────────────────────────────────────────────────────────
function confirmDelete(id){
  resetSwipe();
  const c=clients.find(x=>x.id===id);if(!c)return;
  openModal("delete",id);
}
function deleteClient(id){
  clients=clients.filter(c=>c.id!==id);
  delete messages[id];
  Object.keys(reminders).forEach(k=>{if(reminders[k].clientId===id)delete reminders[k];});
  if(selectedId===id){goBack();}
  saveData();closeModal();renderClientList();showToast("Client deleted");
}

// ── SELECT / NAVIGATE ─────────────────────────────────────────────────────────
function selectClient(id){
  resetSwipe();
  requestNotifPermission();
  selectedId=id;
  const c=clients.find(x=>x.id===id);if(!c)return;
  document.getElementById("chatScreen").classList.add("open");
  const color=avaColor(id);
  document.getElementById("chatAva").textContent=ini(c.fullName);
  document.getElementById("chatAva").style.background=color;
  document.getElementById("chatName").textContent=c.fullName;
  // close info panel when switching
  infoPanelOpen=false;
  document.getElementById("infoPanel").classList.remove("open");
  // build right-side header buttons
  document.getElementById("chatHdrRight").innerHTML=`
    <button class="chat-icon-btn" id="remBtn" onclick="openModal('reminders')">⏰<span id="remBadge"></span></button>
    <button class="chat-icon-btn" onclick="openModal('labels')">🏷</button>
    <button class="chat-icon-btn" onclick="confirmDelete('${id}')" title="Delete client">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </button>`;
  updateRemBtn();
  renderInfoPanel(c);
  renderMessages();
  renderClientList();
}

function toggleInfoPanel(){
  infoPanelOpen=!infoPanelOpen;
  document.getElementById("infoPanel").classList.toggle("open",infoPanelOpen);
  document.getElementById("chatSub").textContent=infoPanelOpen?"Tap to hide info":"Tap to see contact info";
}

function renderInfoPanel(c){
  const panel=document.getElementById("infoPanel");
  const fields=[
    ["Email",c.email?`<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`:"—"],
    ["Phone",c.phone?`<a href="tel:${esc(c.phone)}">${esc(c.phone)}</a>`:"—"],
    ["Budget",esc(c.budget)||"—"],
    ["Type",esc(c.propertyType)||"—"],
    ["Location",esc(c.preferredLocation)||"—"],
    ["Beds / Baths",[c.bedrooms,c.bathrooms].filter(Boolean).join(" / ")||"—"],
    ["Parking",esc(c.parking)||"—"],
    ["Lot Size",esc(c.lotSize)||"—"],
    ["Construction",esc(c.constructionSize)||"—"],
  ].filter(([l,v])=>v&&v!=="—");
  panel.innerHTML=`
    <div class="info-grid">
      ${fields.map(([l,v])=>`<div class="info-field"><div class="info-label">${l}</div><div class="info-val">${v}</div></div>`).join("")}
      ${c.amenities?`<div class="info-field" style="grid-column:1/-1"><div class="info-label">Amenities</div><div class="info-val">${esc(c.amenities)}</div></div>`:""}
      ${c.otherFeatures?`<div class="info-field" style="grid-column:1/-1"><div class="info-label">Other / Comments</div><div class="info-val">${esc(c.otherFeatures)}</div></div>`:""}
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="fbtn fbtn-ghost" style="flex:1;padding:8px;font-size:13px;" onclick="openModal('labels')">🏷 Labels</button>
      <button class="fbtn fbtn-navy" style="flex:1;padding:8px;font-size:13px;" onclick="openModal('reminders')">⏰ Reminders</button>
    </div>`;
}

function goBack(){
  document.getElementById("chatScreen").classList.remove("open");
  infoPanelOpen=false;
  document.getElementById("infoPanel").classList.remove("open");
  selectedId=null;renderClientList();
}

function updateRemBtn(){
  const pr=Object.values(reminders).filter(r=>r.clientId===selectedId&&!r.done).length;
  const b=document.getElementById("remBadge");
  if(b)b.outerHTML=pr>0?`<span class="ibadge" id="remBadge">${pr}</span>`:`<span id="remBadge"></span>`;
}

// ── MESSAGES ──────────────────────────────────────────────────────────────────
function renderMessages(){
  const body=document.getElementById("chatBody"),empty=document.getElementById("emptyChat");
  const msgs=messages[selectedId]||[];
  if(msgs.length===0){body.style.display="none";empty.style.display="flex";return;}
  empty.style.display="none";body.style.display="flex";
  let html="",lastDate=null;
  for(const m of msgs){
    const d=fDate(m.timestamp);
    if(d!==lastDate){html+=`<div class="date-div"><span>${d}</span></div>`;lastDate=d;}
    html+=renderMsg(m);
  }
  body.innerHTML=html;body.scrollTop=body.scrollHeight;
}

function renderMsg(m){
  if(m.type==="form"){
    let c={};
    if(typeof m.content==="string"&&m.content.startsWith("{")){try{c=JSON.parse(m.content);}catch(e){}}
    else{c=clients.find(x=>x.id===m.content)||clients.find(x=>x.id===selectedId)||{};}
    const row=(l,v)=>v&&v!=="—"?`<div><div class="ff-label">${l}</div><div class="ff-val">${esc(v)}</div></div>`:"";
    const rowF=(l,v)=>v&&v!=="—"?`<div class="ff-full"><div class="ff-label">${l}</div><div class="ff-val">${esc(v)}</div></div>`:"";
    return `<div class="mw in"><div class="mlabel">Intake Form</div>
      <div class="bubble form-card"><div class="form-card-hd">Property Request</div>
        <div class="form-grid">
          ${row("Budget",c.budget)}${row("Type",c.propertyType)}
          ${row("Location",c.preferredLocation)}${row("Bedrooms",c.bedrooms)}
          ${row("Bathrooms",c.bathrooms)}${row("Parking",c.parking)}
          ${row("Lot Size",c.lotSize)}${row("Construction",c.constructionSize)}
          ${rowF("Amenities",c.amenities)}${rowF("Other / Comments",c.otherFeatures)}
        </div>
      </div><div class="mtime">${fTime(m.timestamp)}</div></div>`;
  }
  if(m.type==="reminder"){
    const r=reminders[m.content]||{};const done=r.done||false;
    return `<div class="mw out">
      <div class="bubble rem-bubble">
        <div class="rem-hd"><span style="font-size:19px;">⏰</span><span class="rem-title">${esc(r.title||"Reminder")}</span></div>
        <div class="rem-due">${esc(r.dueDate||"")}${r.dueTime?" · "+esc(r.dueTime):""}</div>
        ${r.note?`<div class="rem-note">${esc(r.note)}</div>`:""}
        <div class="rem-actions"><button class="rem-btn${done?" done-btn":""}" onclick="${done?"":"markDone('"+r.id+"')"}">${done?"✓ Completed":"✓ Mark Done"}</button></div>
      </div><div class="mtime">${fTime(m.timestamp)}</div></div>`;
  }
  if(m.type==="reminder_alert"){
    const r=reminders[m.content]||{};
    return `<div class="mw in">
      <div class="bubble ai" style="border-left:4px solid #E8C84A;background:#FFFBF0;">
        <div class="ai-tag" style="color:#7A5A00;">⏰ Reminder Due Now</div>
        <div style="font-weight:700;font-size:15px;color:#1B2E4B;margin-bottom:4px;">${esc(r.title||"Reminder")}</div>
        ${r.note?`<div style="font-size:13px;color:var(--text2);margin-bottom:8px;">${esc(r.note)}</div>`:""}
        <div class="rem-actions">
          <button class="rem-btn${r.done?" done-btn":""}" onclick="${r.done?"":"markDone('"+r.id+"')"}">${r.done?"✓ Already done":"✓ Mark Done"}</button>
        </div>
      </div>
      <div class="mtime">${fTime(m.timestamp)}</div>
    </div>`;
  }
  if(m.type==="ai")return`<div class="mw in"><div class="bubble ai"><div class="ai-tag">AI Assistant</div><div>${esc(m.content)}</div></div><div class="mtime">${fTime(m.timestamp)}</div></div>`;
  if(m.type==="note")return`<div class="mw out"><div class="bubble note">${esc(m.content)}</div><div class="mtime">${fTime(m.timestamp)}</div></div>`;
  if(m.type==="question")return`<div class="mw out"><div class="bubble question">${esc(m.content)}</div><div class="mtime">${fTime(m.timestamp)}</div></div>`;
  return"";
}

function appendMsg(m){
  const body=document.getElementById("chatBody"),empty=document.getElementById("emptyChat");
  empty.style.display="none";body.style.display="flex";
  body.insertAdjacentHTML("beforeend",renderMsg(m));

}

// ── LOCAL REMINDER PARSER (no API needed) ────────────────────────────────────
function parseReminder(text){
  const t = text.toLowerCase();
  // detect trigger words
  const triggers = ["remind me","reminder","set a reminder","don't forget","dont forget","remember to","follow up","follow-up","send email","email to","send an email","enviar correo","correo a","llamar","recordar","recordatorio"];
  const isReminder = triggers.some(tr => t.includes(tr));
  if(!isReminder) return {isReminder:false};

  // extract time — match patterns like 9am, 9:30am, 9:00 AM, 3pm, 3:30 PM
  let dueTime = "";
  const timeMatch = text.match(/\b(\d{1,2})(?::(\d{2}))?\s*(am|pm|AM|PM)\b/i);
  if(timeMatch){
    let h = parseInt(timeMatch[1]);
    const m = timeMatch[2] ? timeMatch[2] : "00";
    const ampm = timeMatch[3].toUpperCase();
    dueTime = `${h}:${m} ${ampm}`;
  }

  // extract date — days of week, relative words, specific dates
  let dueDate = "";
  const days = ["monday","tuesday","wednesday","thursday","friday","saturday","sunday",
                "lunes","martes","miércoles","miercoles","jueves","viernes","sábado","sabado","domingo"];
  const dayFound = days.find(d => t.includes(d));
  if(dayFound){
    dueDate = dayFound.charAt(0).toUpperCase() + dayFound.slice(1);
  } else if(t.includes("tomorrow") || t.includes("mañana")){
    dueDate = "Tomorrow";
  } else if(t.includes("today") || t.includes("hoy")){
    dueDate = "Today";
  } else if(t.includes("next week") || t.includes("próxima semana")){
    dueDate = "Next week";
  } else {
    // try to find a date like "June 10", "10 June", "6/10"
    const dateMatch = text.match(/\b(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s+\d{1,2}\b/i)
      || text.match(/\b\d{1,2}[\/-]\d{1,2}\b/);
    if(dateMatch) dueDate = dateMatch[0];
  }

  // build title — strip trigger phrase and time/date noise to get the action
  let title = text
    .replace(/remind me to?/i,"").replace(/set a reminder to?/i,"").replace(/reminder to?/i,"")
    .replace(/don'?t forget to?/i,"").replace(/remember to?/i,"")
    .replace(/follow[\s-]?up/i,"Follow up")
    .replace(/send an? email to?/i,"Email").replace(/email to/i,"Email")
    .replace(/enviar correo a?/i,"Correo").replace(/correo a/i,"Correo")
    .replace(/\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i,"")
    .replace(/\b(at|on|by|this|next)\b/gi,"")
    .replace(new RegExp(days.join("|"),"gi"),"")
    .replace(/tomorrow|today|mañana|hoy/gi,"")
    .replace(/\s{2,}/g," ").trim();

  if(!title) title = "Reminder";
  // capitalize first letter
  title = title.charAt(0).toUpperCase() + title.slice(1);
  // strip trailing punctuation
  title = title.replace(/[,.:]+$/,"").trim();

  return {isReminder:true, title, dueDate, dueTime, note:""};
}

// ── SEND ──────────────────────────────────────────────────────────────────────
async function sendMessage(){
  const inp=document.getElementById("msgInput"),text=inp.value.trim();
  if(!text||!selectedId||isLoading)return;
  inp.value="";autoResize(inp);
  if(inputMode==="note"){
    const parsed = parseReminder(text);
    if(parsed.isReminder){
      const rid="r_"+Date.now();
      reminders[rid]={id:rid,clientId:selectedId,title:parsed.title,dueDate:parsed.dueDate||"",dueTime:parsed.dueTime||"",note:parsed.note||"",done:false,createdAt:new Date().toISOString()};
      const msg={id:"m_"+Date.now(),clientId:selectedId,type:"reminder",content:rid,timestamp:new Date().toISOString()};
      if(!messages[selectedId])messages[selectedId]=[];
      messages[selectedId].push(msg);saveData();appendMsg(msg);updateRemBtn();renderClientList();showToast("⏰ Reminder set");
    } else {
      const msg={id:"m_"+Date.now(),clientId:selectedId,type:"note",content:text,timestamp:new Date().toISOString()};
      if(!messages[selectedId])messages[selectedId]=[];
      messages[selectedId].push(msg);saveData();appendMsg(msg);renderClientList();
    }
  } else {
    const qMsg={id:"m_"+Date.now(),clientId:selectedId,type:"question",content:text,timestamp:new Date().toISOString()};
    if(!messages[selectedId])messages[selectedId]=[];
    messages[selectedId].push(qMsg);appendMsg(qMsg);
    showTyping();
    const c=clients.find(x=>x.id===selectedId)||{};
    const history=(messages[selectedId]||[]).map(m=>`[${m.type}]: ${m.type==="form"?"[Intake form]":m.type==="reminder"?"[Reminder: "+(reminders[m.content]?.title||"")+" on "+(reminders[m.content]?.dueDate||"")+"]":m.content}`).join("\n");
    const answer=await callClaude(`You are an intelligent real estate CRM assistant. Answer questions about this client based on their profile and history. Be concise and accurate.`,`Client:\n${JSON.stringify(c,null,2)}\n\nHistory:\n${history}\n\nQuestion: ${text}`);
    hideTyping();
    const aMsg={id:"m_"+(Date.now()+1),clientId:selectedId,type:"ai",content:answer,timestamp:new Date().toISOString()};
    messages[selectedId].push(aMsg);saveData();appendMsg(aMsg);
  }
}

async function callClaude(system,user,maxTokens=800){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system,messages:[{role:"user",content:user}]})});
    const data=await res.json();return data.content?.find(b=>b.type==="text")?.text||"";
  }catch(e){return"Error: "+e.message;}
}

function showTyping(){
  document.getElementById("chatBody").insertAdjacentHTML("beforeend",`<div class="mw in" id="typingWrap"><div class="mlabel">AI Assistant</div><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>`);
  document.getElementById("chatBody").scrollTop=99999;
}
function hideTyping(){const t=document.getElementById("typingWrap");if(t)t.remove();}
function setLoading(v){isLoading=v;document.getElementById("lbar").style.display=v?"block":"none";}
function setMode(m){
  inputMode=m;
  document.getElementById("tabNote").classList.toggle("on",m==="note");
  document.getElementById("tabAsk").classList.toggle("on",m==="ask");
  document.getElementById("msgInput").placeholder=m==="note"?`Write a note… or "remind me to call at 9am Saturday"`:"Ask anything… e.g. Has Scott provided a budget?";
  document.getElementById("inputHint").style.display=m==="note"?"block":"none";
}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,110)+"px";}
function markDone(rid){if(reminders[rid])reminders[rid].done=true;saveData();renderMessages();updateRemBtn();renderClientList();}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openModal(type,payload){
  document.getElementById("modalOverlay").style.display="flex";
  const box=document.getElementById("modalBox");
  if(type==="addClient")box.innerHTML=clientFormHTML("Create Client","handleAddClient");
  else if(type==="intake")box.innerHTML=clientFormHTML("Submit Form","handleIntake",true);
  else if(type==="reminders")box.innerHTML=remindersHTML();
  else if(type==="remForm")box.innerHTML=reminderFormHTML();
  else if(type==="labels")box.innerHTML=labelsHTML();
  else if(type==="delete")box.innerHTML=deleteHTML(payload);
}
function closeModal(){document.getElementById("modalOverlay").style.display="none";document.getElementById("modalBox").innerHTML="";}
function overlayClick(e){if(e.target===e.currentTarget)closeModal();}

// ── DELETE MODAL ──────────────────────────────────────────────────────────────
function deleteHTML(id){
  const c=clients.find(x=>x.id===id)||{};
  const msgCount=(messages[id]||[]).length;
  const remCount=Object.values(reminders).filter(r=>r.clientId===id).length;
  return `<div class="modal-handle"></div>
  <div class="mhdr"><div class="mtitle" style="color:var(--red);">Delete Client</div><button class="mclose" onclick="closeModal()">×</button></div>
  <div class="mbody">
    <div class="confirm-box">
      <p>You are about to permanently delete <strong>${esc(c.fullName)}</strong> and all their data:</p>
      <p style="margin-top:8px;font-size:13px;color:var(--text2);">· ${msgCount} message${msgCount!==1?"s":""} &nbsp;·&nbsp; ${remCount} reminder${remCount!==1?"s":""}</p>
      <p style="margin-top:8px;font-size:13px;"><strong>This cannot be undone.</strong></p>
    </div>
    <div class="factions">
      <button class="fbtn fbtn-ghost" onclick="closeModal()">Cancel</button>
      <button class="fbtn fbtn-red" onclick="deleteClient('${id}')">Delete</button>
    </div>
  </div>`;
}

  const L=(en,es)=>bilingual?`${en} <em style="color:var(--text3);font-style:normal;font-size:11px;">/ ${es}</em>`:en;
  const ph=(en,es)=>bilingual?`${en} / ${es}`:en;
  const sel=(field,opts)=>`<select class="finput" id="f_${field}">${opts.map(o=>`<option>${o}</option>`).join("")}</select>`;
  return `<div class="modal-handle"></div>
  <div class="mhdr"><div class="mtitle">${bilingual?"Intake Form":"New Client"}</div><button class="mclose" onclick="closeModal()">×</button></div>
  <div class="mbody">
    ${bilingual?`<p style="font-size:13px;color:var(--text2);margin-bottom:14px;">Share with your prospect. / Comparte con tu prospecto.</p>`:""}
    <div class="fsec"><div class="fsec-title">Contact</div>
      <div class="frow"><div class="fg"><label class="flabel">${L("Full Name","Nombre completo")}</label><input class="finput" id="f_fullName" placeholder="${ph("John Smith","Juan García")}"></div>
      <div class="fg"><label class="flabel">${L("Email","Correo")}</label><input class="finput" id="f_email" type="email" placeholder="john@email.com"></div></div>
      <div class="frow"><div class="fg"><label class="flabel">${L("Phone","Teléfono")}</label><input class="finput" id="f_phone" type="tel" placeholder="+1 555 000"></div>
      <div class="fg"><label class="flabel">${L("Budget","Presupuesto")}</label><input class="finput" id="f_budget" placeholder="${ph("$500,000","₡250M")}"></div></div>
    </div>
    <div class="fsec"><div class="fsec-title">Property</div>
      <div class="frow"><div class="fg"><label class="flabel">${L("Property Type","Tipo")}</label><input class="finput" id="f_propertyType" placeholder="${ph("House, Condo…","Casa, Apto…")}"></div>
      <div class="fg"><label class="flabel">${L("Location","Ubicación")}</label><input class="finput" id="f_preferredLocation" placeholder="Tamarindo…"></div></div>
      <div class="frow"><div class="fg"><label class="flabel">${L("Bedrooms","Habitaciones")}</label><input class="finput" id="f_bedrooms" placeholder="3"></div>
      <div class="fg"><label class="flabel">${L("Bathrooms","Baños")}</label><input class="finput" id="f_bathrooms" placeholder="2"></div></div>
      <div class="frow"><div class="fg"><label class="flabel">${L("Lot Size","Lote")}</label><input class="finput" id="f_lotSize" placeholder="500 m²"></div>
      <div class="fg"><label class="flabel">${L("Construction","Construcción")}</label><input class="finput" id="f_constructionSize" placeholder="250 m²"></div></div>
      <div class="frow"><div class="fg"><label class="flabel">${L("Parking","Parqueo")}</label><input class="finput" id="f_parking" placeholder="2"></div><div></div></div>
      <div class="frow one"><div class="fg"><label class="flabel">${L("Amenities","Amenidades")}</label><input class="finput" id="f_amenities" placeholder="${ph("Pool, Gym…","Piscina, Gym…")}"></div></div>
      <div class="frow one"><div class="fg"><label class="flabel">${L("Other Features / Comments","Otras características / Comentarios")}</label><textarea class="finput" id="f_otherFeatures" rows="3" style="resize:none;" placeholder="${ph("Ocean view, notes…","Vista al mar, notas…")}"></textarea></div></div>
    </div>
    <div class="fsec"><div class="fsec-title">Classification</div>
      <div class="frow">
        <div class="fg"><label class="flabel">${L("Client Type","Tipo")}</label>${sel("clientType",CLIENT_TYPES)}</div>
        <div class="fg"><label class="flabel">${L("Status","Estado")}</label>${sel("status",CLIENT_STATUSES)}</div>
      </div>
    </div>
    <div class="factions">
      <button class="fbtn fbtn-ghost" onclick="closeModal()">Cancel</button>
      <button class="fbtn fbtn-navy" onclick="${submitFn}()">${btnLabel}</button>
    </div>
  </div>`;
}

function getFormData(){
  const fields=["fullName","email","phone","budget","propertyType","preferredLocation","bedrooms","bathrooms","lotSize","constructionSize","parking","amenities","otherFeatures","clientType","status"];
  const d={};fields.forEach(f=>{const el=document.getElementById("f_"+f);if(el)d[f]=el.value.trim();});return d;
}
function handleAddClient(){
  const d=getFormData();if(!d.fullName)return;
  const id="c_"+Date.now(),c={...d,id,createdAt:new Date().toISOString()};
  clients.unshift(c);
  const msg={id:"m_"+Date.now(),clientId:id,type:"form",content:JSON.stringify(c),timestamp:new Date().toISOString()};
  messages[id]=[msg];saveData();closeModal();selectClient(id);renderClientList();showToast("Client created");
}
function handleIntake(){
  const d=getFormData();if(!d.fullName)return;
  const id="c_"+Date.now(),c={...d,id,createdAt:new Date().toISOString()};
  const msg={id:"m_"+Date.now(),clientId:id,type:"form",content:JSON.stringify(c),timestamp:new Date().toISOString()};
  clients.unshift(c);messages[id]=[msg];saveData();closeModal();selectClient(id);renderClientList();showToast("Intake submitted");
}

// ── REMINDERS ─────────────────────────────────────────────────────────────────
function remindersHTML(){
  const cRems=Object.values(reminders).filter(r=>r.clientId===selectedId);
  const items=cRems.length?cRems.map(r=>`
    <div class="rem-item${r.done?" faded":""}">
      <div style="flex:1;">
        <div style="font-weight:700;color:var(--navy);font-size:15px;">${esc(r.title)}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:3px;">${esc(r.dueDate)}${r.dueTime?" · "+esc(r.dueTime):""}</div>
        ${r.note?`<div style="font-size:13px;color:var(--text);margin-top:5px;">${esc(r.note)}</div>`:""}
      </div>
      ${!r.done?`<button class="rem-btn" onclick="markDoneFromModal('${r.id}')">✓ Done</button>`:`<button class="rem-btn done-btn">✓</button>`}
    </div>`).join(""):`<p style="color:var(--text3);font-size:14px;margin-bottom:16px;">No reminders yet.</p>`;
  return `<div class="modal-handle"></div>
  <div class="mhdr"><div class="mtitle">⏰ Reminders</div><button class="mclose" onclick="closeModal()">×</button></div>
  <div class="mbody"><div class="rem-list">${items}</div>
  <button class="fbtn fbtn-navy" style="width:100%;" onclick="openModal('remForm')">+ Add Reminder</button></div>`;
}
function markDoneFromModal(rid){if(reminders[rid])reminders[rid].done=true;saveData();renderMessages();updateRemBtn();renderClientList();openModal("reminders");}

function reminderFormHTML(){
  return `<div class="modal-handle"></div>
  <div class="mhdr"><div class="mtitle">⏰ New Reminder</div><button class="mclose" onclick="closeModal()">×</button></div>
  <div class="mbody">
    <div class="fg" style="margin-bottom:13px;"><label class="flabel">Title *</label><input class="finput" id="rf_title" placeholder="e.g. Follow up on budget" style="margin-top:5px;"></div>
    <div class="frow" style="margin-bottom:13px;">
      <div class="fg"><label class="flabel">Date *</label><input class="finput" id="rf_date" placeholder="Saturday, June 10…" style="margin-top:5px;"></div>
      <div class="fg"><label class="flabel">Time</label><input class="finput" id="rf_time" placeholder="9:00 AM" style="margin-top:5px;"></div>
    </div>
    <div class="fg" style="margin-bottom:16px;"><label class="flabel">Note (optional)</label><textarea class="finput" id="rf_note" rows="3" style="margin-top:5px;resize:none;" placeholder="Additional context…"></textarea></div>
    <div id="rf_error" style="color:#C00;font-size:13px;margin-bottom:10px;display:none;">Please fill in Title and Date.</div>
    <div class="factions">
      <button class="fbtn fbtn-ghost" onclick="openModal('reminders')">Back</button>
      <button class="fbtn fbtn-navy" onclick="saveReminder()">Add Reminder</button>
    </div>
  </div>`;
}
function saveReminder(){
  const title=(document.getElementById("rf_title")?.value||"").trim();
  const dueDate=(document.getElementById("rf_date")?.value||"").trim();
  const dueTime=(document.getElementById("rf_time")?.value||"").trim();
  const note=(document.getElementById("rf_note")?.value||"").trim();
  if(!title||!dueDate){const e=document.getElementById("rf_error");if(e)e.style.display="block";return;}
  const rid="r_"+Date.now();
  reminders[rid]={id:rid,clientId:selectedId,title,dueDate,dueTime,note,done:false,createdAt:new Date().toISOString()};
  const msg={id:"m_"+(Date.now()+1),clientId:selectedId,type:"reminder",content:rid,timestamp:new Date().toISOString()};
  if(!messages[selectedId])messages[selectedId]=[];
  messages[selectedId].push(msg);
  saveData();closeModal();appendMsg(msg);updateRemBtn();renderClientList();showToast("⏰ Reminder added");
}

// ── LABELS ────────────────────────────────────────────────────────────────────
function labelsHTML(){
  const c=clients.find(x=>x.id===selectedId)||{};
  const typeBtns=CLIENT_TYPES.map(t=>{
    const col=TYPE_COLORS[t]||{bg:"#F0F0F0",text:"#606060",border:"#D0D0D0"};
    const sel=c.clientType===t;
    return `<button class="stag" onclick="setLabel('clientType','${t}')" style="background:${sel?col.bg:"#F5F5F5"};color:${sel?col.text:"#909090"};border-color:${sel?col.border:"#E0E0E0"};">${t}</button>`;
  }).join("");
  const statBtns=CLIENT_STATUSES.map(s=>{
    const col=STATUS_COLORS[s]||{bg:"#F0F0F0",text:"#606060",border:"#D0D0D0"};
    const sel=c.status===s;
    return `<button class="stag" onclick="setLabel('status','${s}')" style="background:${sel?col.bg:"#F5F5F5"};color:${sel?col.text:"#909090"};border-color:${sel?col.border:"#E0E0E0"};">${s}</button>`;
  }).join("");
  return `<div class="modal-handle"></div>
  <div class="mhdr"><div class="mtitle">🏷 Labels</div><button class="mclose" onclick="closeModal()">×</button></div>
  <div class="mbody">
    <div style="margin-bottom:22px;"><div class="fsec-title">Client Type</div><div class="srow">${typeBtns}</div></div>
    <div><div class="fsec-title">Status</div><div class="srow">${statBtns}</div></div>
    <div class="factions"><button class="fbtn fbtn-navy" onclick="closeModal()">Done</button></div>
  </div>`;
}
function setLabel(field,val){
  const c=clients.find(x=>x.id===selectedId);if(!c)return;
  c[field]=val;saveData();renderClientList();openModal("labels");
}

function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";
  setTimeout(()=>t.style.display="none",2800);
}
